<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>化妆品 24 国语言翻译助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .module-card { transition: all 0.3s ease; }
        .result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const LANG_MAP = {
            "英语": "en", "德语": "de", "法语": "fr", "西班牙语": "es", "意大利语": "it", 
            "丹麦语": "da", "捷克语": "cs", "瑞典语": "sv", "希腊语": "el", "芬兰语": "fi", 
            "葡萄牙语": "pt", "荷兰语": "nl", "保加利亚语": "bg", "克罗地亚语": "hr", 
            "爱沙尼亚语": "et", "匈牙利语": "hu", "爱尔兰语": "ga", "拉脱维亚语": "lv", 
            "立陶宛语": "lt", "马耳他语": "mt", "波兰语": "pl", "罗马尼亚语": "ro", 
            "斯洛伐克语": "sk", "斯洛文尼亚语": "sl"
        };
        const LANGUAGES = Object.keys(LANG_MAP);

        function App() {
            // 模块 1 状态
            const [catInput, setCatInput] = useState('');
            const [catResults, setCatResults] = useState({});
            const [catLoading, setCatLoading] = useState(false);

            // 模块 2 状态
            const [infoInput, setInfoInput] = useState('');
            const [infoResults, setInfoResults] = useState({});
            const [infoLoading, setInfoLoading] = useState(false);

            // 基础翻译函数
            const translate = async (text, targetLang) => {
                if (!text.trim()) return "";
                try {
                    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
                    const response = await fetch(url);
                    const data = await response.json();
                    return data[0].map(item => item[0]).join('');
                } catch (e) { return "Error"; }
            };

            // 执行翻译逻辑
            const handleTranslate = async (type) => {
                const text = type === 'cat' ? catInput : infoInput;
                const setLoading = type === 'cat' ? setCatLoading : setInfoLoading;
                const setResults = type === 'cat' ? setCatResults : setInfoResults;

                if (!text.trim()) return;
                setLoading(true);
                
                const results = {};
                const promises = LANGUAGES.map(async (name) => {
                    results[name] = await translate(text, LANG_MAP[name]);
                });

                await Promise.all(promises);
                setResults(results);
                setLoading(false);
            };

            // 一键提取并复制
            const copyResults = (results) => {
                const text = LANGUAGES.map(l => results[l]).filter(Boolean).join(', ');
                if (text) {
                    navigator.clipboard.writeText(text);
                    alert('已成功提取并复制，内容已按“，”分隔。');
                }
            };

            return (
                <div className="max-w-7xl mx-auto px-4 py-10">
                    <header className="mb-12 text-center">
                        <h1 className="text-4xl font-black text-slate-900 tracking-tight">化妆品 24 国语言翻译助手</h1>
                        <p className="text-slate-500 mt-3 text-lg">专业跨境电商化妆品文案多语种解决方案</p>
                    </header>

                    <div className="space-y-10">
                        
                        {/* 模块 1：本体品类词 */}
                        <section className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden module-card hover:shadow-md">
                            <div className="bg-rose-500 px-8 py-4 flex justify-between items-center">
                                <h2 className="text-white font-bold text-xl">模块一：本体品类词 24 国语言</h2>
                                <span className="bg-rose-400 text-white text-xs px-2 py-1 rounded">Category Words</span>
                            </div>
                            <div className="p-8">
                                <div className="mb-6">
                                    <label className="block text-sm font-bold text-slate-600 mb-2">输入品类词</label>
                                    <input 
                                        className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-6 py-4 text-lg focus:border-rose-400 outline-none transition-all"
                                        placeholder="建议不要加前缀词，如果是眼影直接输入 eyeshadow，如果是体绘直接输入 body paint，输入品类词即可，让消费者清晰知道该产品的功效用途。"
                                        value={catInput}
                                        onChange={(e) => setCatInput(e.target.value)}
                                    />
                                </div>
                                <div className="flex gap-4 mb-8">
                                    <button 
                                        onClick={() => handleTranslate('cat')}
                                        disabled={catLoading}
                                        className="bg-slate-900 hover:bg-black text-white font-bold px-8 py-4 rounded-2xl transition-all disabled:opacity-50"
                                    >
                                        {catLoading ? '翻译中...' : '生成 24 国品类词'}
                                    </button>
                                    {Object.keys(catResults).length > 0 && (
                                        <button 
                                            onClick={() => copyResults(catResults)}
                                            className="bg-rose-100 text-rose-600 hover:bg-rose-200 font-bold px-8 py-4 rounded-2xl transition-all"
                                        >
                                            一键提取内容（“，”分隔）
                                        </button>
                                    )}
                                </div>
                                <div className="result-grid">
                                    {LANGUAGES.map(l => (
                                        <div key={l} className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                            <div className="text-[10px] font-bold text-slate-400 uppercase mb-1">{l}</div>
                                            <div className="text-slate-700 font-medium break-words">{catResults[l] || '-'}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* 模块 2：Safe Use / Functions */}
                        <section className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden module-card hover:shadow-md">
                            <div className="bg-blue-600 px-8 py-4 flex justify-between items-center">
                                <h2 className="text-white font-bold text-xl">模块二：24 国 safe use / functions</h2>
                                <span className="bg-blue-500 text-white text-xs px-2 py-1 rounded">Instruction & Effects</span>
                            </div>
                            <div className="p-8">
                                <div className="mb-6">
                                    <label className="block text-sm font-bold text-slate-600 mb-2">输入详细内容</label>
                                    <textarea 
                                        className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-6 py-4 text-base focus:border-blue-400 outline-none transition-all min-h-[120px]"
                                        placeholder="在此输入产品的 Safe Use（使用安全说明）或 Functions（产品功效功能）内容..."
                                        value={infoInput}
                                        onChange={(e) => setInfoInput(e.target.value)}
                                    />
                                </div>
                                <div className="flex gap-4 mb-8">
                                    <button 
                                        onClick={() => handleTranslate('info')}
                                        disabled={infoLoading}
                                        className="bg-slate-900 hover:bg-black text-white font-bold px-8 py-4 rounded-2xl transition-all disabled:opacity-50"
                                    >
                                        {infoLoading ? '翻译中...' : '生成 24 国说明'}
                                    </button>
                                    {Object.keys(infoResults).length > 0 && (
                                        <button 
                                            onClick={() => copyResults(infoResults)}
                                            className="bg-blue-100 text-blue-600 hover:bg-blue-200 font-bold px-8 py-4 rounded-2xl transition-all"
                                        >
                                            一键提取内容（“，”分隔）
                                        </button>
                                    )}
                                </div>
                                <div className="result-grid">
                                    {LANGUAGES.map(l => (
                                        <div key={l} className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                            <div className="text-[10px] font-bold text-slate-400 uppercase mb-1">{l}</div>
                                            <div className="text-slate-700 font-medium text-sm leading-snug">{infoResults[l] || '-'}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
