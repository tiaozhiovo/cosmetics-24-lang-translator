<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>化妆品 24 国翻译助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const LANG_MAP = {
            "英语": "en", "德语": "de", "法语": "fr", "西班牙语": "es", "意大利语": "it", 
            "丹麦语": "da", "捷克语": "cs", "瑞典语": "sv", "希腊语": "el", "芬兰语": "fi", 
            "葡萄牙语": "pt", "荷兰语": "nl", "保加利亚语": "bg", "克罗地亚语": "hr", 
            "爱沙尼亚语": "et", "匈牙利语": "hu", "爱尔兰语": "ga", "拉脱维亚语": "lv", 
            "立陶宛语": "lt", "马耳他语": "mt", "波兰语": "pl", "罗马尼亚语": "ro", 
            "斯洛伐克语": "sk", "斯洛文尼亚语": "sl"
        };

        const LANGUAGES = Object.keys(LANG_MAP);

        function App() {
            const [inputText, setInputText] = useState('');
            const [translations, setTranslations] = useState({});
            const [loading, setLoading] = useState(false);
            const [copyStatus, setCopyStatus] = useState('一键提取结果 (逗号分隔)');

            const translateText = async (text, targetLang) => {
                try {
                    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
                    const response = await fetch(url);
                    const data = await response.json();
                    // 拼接多行翻译结果
                    return data[0].map(item => item[0]).join('');
                } catch (error) {
                    return "翻译出错";
                }
            };

            const handleTranslateAll = async () => {
                if (!inputText.trim()) return;
                setLoading(true);
                const results = {};
                
                const promises = LANGUAGES.map(async (name) => {
                    const res = await translateText(inputText, LANG_MAP[name]);
                    results[name] = res;
                });

                await Promise.all(promises);
                setTranslations(results);
                setLoading(false);
            };

            const copyToClipboard = () => {
                const text = LANGUAGES.map(l => translations[l]).filter(Boolean).join(', ');
                if (text) {
                    navigator.clipboard.writeText(text);
                    setCopyStatus('✅ 已成功复制');
                    setTimeout(() => setCopyStatus('一键提取结果 (逗号分隔)'), 2000);
                }
            };

            return (
                <div className="max-w-6xl mx-auto px-6 py-10">
                    <header className="mb-8 text-left border-l-4 border-blue-600 pl-4">
                        <h1 className="text-2xl font-bold text-slate-800 text-balance">化妆品多语言翻译助手</h1>
                        <p className="text-slate-500 mt-1 text-sm">
                            输入化妆品品类词、safe use 内容、functions 内容，即刻获取 24 国语言翻译结果
                        </p>
                    </header>

                    {/* Input Section */}
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
                        <textarea 
                            className="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 text-base focus:ring-2 focus:ring-blue-500 outline-none transition-all min-h-[150px] custom-scrollbar"
                            placeholder="请在此输入内容...&#10;示例：&#10;品类：保湿面霜&#10;Safe Use：避开眼睛周围使用。&#10;Functions：深度补水，锁住水分。"
                            value={inputText}
                            onChange={(e) => setInputText(e.target.value)}
                        />
                        <div className="flex justify-between items-center mt-4">
                            <span className="text-xs text-slate-400 font-medium">支持多行输入，Google 引擎驱动</span>
                            <button 
                                onClick={handleTranslateAll}
                                disabled={loading || !inputText.trim()}
                                className="bg-blue-600 hover:bg-blue-700 text-white font-bold px-10 py-3 rounded-xl transition-all disabled:opacity-30 flex items-center gap-2"
                            >
                                {loading && <span className="animate-spin text-lg">⏳</span>}
                                {loading ? '正在处理 24 国语...' : '立即翻译'}
                            </button>
                        </div>
                    </div>

                    {/* Output Section */}
                    {Object.keys(translations).length > 0 && (
                        <div className="animate-in fade-in duration-500">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="font-bold text-slate-700 flex items-center gap-2">
                                    <span className="w-2 h-2 bg-green-500 rounded-full"></span>
                                    翻译结果汇总
                                </h2>
                                <button 
                                    onClick={copyToClipboard}
                                    className="text-sm font-bold text-blue-600 bg-white border border-blue-200 hover:bg-blue-50 px-6 py-2 rounded-full transition-all shadow-sm"
                                >
                                    {copyStatus}
                                </button>
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                {LANGUAGES.map(lang => (
                                    <div key={lang} className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-all flex flex-col justify-between">
                                        <div>
                                            <div className="text-[11px] font-black text-blue-400 mb-3 uppercase tracking-widest">{lang}</div>
                                            <div className="text-slate-700 text-sm leading-relaxed whitespace-pre-wrap">
                                                {translations[lang]}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
