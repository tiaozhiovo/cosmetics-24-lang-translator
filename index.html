<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmetics 24-Language Translation Assistant (MS Engine)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50/50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        /**
         * 重要提示：
         * 请在下面的引号中填入你在 Google AI Studio (https://aistudio.google.com/app/apikey) 
         * 申请到的免费 API Key。否则会提示 401 授权失败。
         */
        const apiKey = ""; // <--- 在这里填入你的 API Key

        const LANGUAGES = [
            { key: 'English', zh: '英语' }, { key: 'German', zh: '德语' }, { key: 'French', zh: '法语' },
            { key: 'Spanish', zh: '西班牙语' }, { key: 'Italian', zh: '意大利语' }, { key: 'Danish', zh: '丹麦语' },
            { key: 'Czech', zh: '捷克语' }, { key: 'Swedish', zh: '瑞典语' }, { key: 'Greek', zh: '希腊语' },
            { key: 'Finnish', zh: '芬兰语' }, { key: 'Portuguese', zh: '葡萄牙语' }, { key: 'Dutch', zh: '荷兰语' },
            { key: 'Bulgarian', zh: '保加利亚语' }, { key: 'Croatian', zh: '克罗地亚语' }, { key: 'Estonian', zh: '爱沙尼亚语' },
            { key: 'Hungarian', zh: '匈牙利语' }, { key: 'Irish', zh: '爱尔兰语' }, { key: 'Latvian', zh: '拉脱维亚语' },
            { key: 'Lithuanian', zh: '立陶宛语' }, { key: 'Maltese', zh: '马耳他语' }, { key: 'Polish', zh: '波兰语' },
            { key: 'Romanian', zh: '罗马尼亚语' }, { key: 'Slovak', zh: '斯洛伐克语' }, { key: 'Slovenian', zh: '斯洛文尼亚语' }
        ];

        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const copyToClipboard = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            return true;
        };

        const fetchTranslation = async (text, type) => {
            if (!apiKey) {
                throw new Error("检测到 API Key 为空。请先在代码中填入您的密钥。");
            }

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const systemPrompt = type === 'category' 
                ? `You are an expert technical translator specializing in EU Cosmetic Regulations. Use Microsoft Translator professional terminology style. Translate the product category into 24 European languages for labeling.`
                : `You are an expert technical translator for cosmetic safety standards. Translate the instruction into 24 European languages using formal, regulatory, and legally compliant phrasing as per EU 1223/2009.`;

            const properties = {};
            LANGUAGES.forEach(lang => { properties[lang.key] = { type: "STRING" }; });

            const payload = {
                contents: [{ parts: [{ text: `Input Text: "${text}"` }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: { type: "OBJECT", properties: properties, required: LANGUAGES.map(l => l.key) }
                }
            };

            const delays = [1000, 2000, 4000];
            for (let attempt = 0; attempt <= 3; attempt++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (response.status === 401 || response.status === 403) {
                        throw new Error("API 密钥无效或未生效。请检查密钥是否正确，或是否已在 Google AI Studio 启用权限。");
                    }
                    
                    if (!response.ok) throw new Error(`HTTP 错误: ${response.status}`);
                    
                    const data = await response.json();
                    if (!data.candidates?.[0]?.content?.parts?.[0]?.text) {
                        throw new Error("翻译引擎未返回数据，请稍后重试。");
                    }
                    return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (e) {
                    if (attempt === 3 || e.message.includes("API 密钥")) throw e;
                    await new Promise(r => setTimeout(r, delays[attempt]));
                }
            }
        };

        const TranslationCard = ({ title, theme, hint, examples, type }) => {
            const [input, setInput] = useState('');
            const [results, setResults] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [copied, setCopied] = useState(null);

            const themeClasses = theme === 'blue' 
                ? { border: 'border-blue-200', bg: 'bg-blue-50', text: 'text-blue-800', btn: 'bg-blue-600 hover:bg-blue-700', icon: 'blue' }
                : { border: 'border-emerald-200', bg: 'bg-emerald-50', text: 'text-emerald-800', btn: 'bg-emerald-600 hover:bg-emerald-700', icon: 'emerald' };

            const handleAction = async () => {
                if (!input.trim()) return;
                setLoading(true); setError(''); setResults(null);
                try {
                    const res = await fetchTranslation(input.trim(), type);
                    setResults(res);
                } catch (e) {
                    setError(e.message || '翻译失败，请检查网络连接或 API 密钥。');
                } finally {
                    setLoading(false);
                }
            };

            const doCopy = (text, type) => {
                if (copyToClipboard(text)) {
                    setCopied(type);
                    setTimeout(() => setCopied(null), 2000);
                }
            };

            return (
                <div className={`bg-white rounded-2xl shadow-sm border ${themeClasses.border} overflow-hidden flex flex-col h-full`}>
                    <div className={`${themeClasses.bg} p-5 border-b ${themeClasses.border} flex items-center gap-3`}>
                        <Icon name={theme === 'blue' ? "languages" : "sparkles"} className={`w-6 h-6 text-${themeClasses.icon}-500`} />
                        <h2 className={`text-xl font-bold ${themeClasses.text}`}>{title}</h2>
                    </div>
                    <div className="p-6 flex-1 flex flex-col overflow-hidden">
                        <div className="text-sm text-gray-600 mb-4 bg-gray-50 p-4 rounded-xl border border-gray-100">{hint}</div>
                        <div className="flex flex-wrap gap-2 mb-4">
                            {examples.map(ex => (
                                <button key={ex} onClick={() => setInput(ex)} className="text-xs px-3 py-1 rounded-full border border-gray-200 hover:bg-gray-100 transition-colors shadow-sm bg-white">{ex}</button>
                            ))}
                        </div>
                        <textarea 
                            value={input} 
                            onChange={e => setInput(e.target.value)}
                            className="w-full p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none h-24 mb-4 resize-none text-lg"
                            placeholder="在此输入英文内容..."
                        />
                        <div className="flex gap-3 mb-6">
                            <button onClick={handleAction} disabled={loading} className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-lg text-white font-bold transition-all shadow-md active:scale-95 disabled:bg-gray-400 ${themeClasses.btn}`}>
                                {loading ? <Icon name="loader-2" className="animate-spin" /> : <Icon name="wand-2" />}
                                <span>{loading ? '正在调取微软/AI引擎...' : '开始翻译 (Translate)'}</span>
                            </button>
                            <button onClick={() => {setInput(''); setResults(null); setError('');}} className="px-4 py-3 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 transition-colors"><Icon name="trash-2" /></button>
                        </div>

                        {error && (
                            <div className="p-4 mb-4 bg-red-50 text-red-700 rounded-xl border border-red-100 text-sm flex items-start gap-3">
                                <Icon name="alert-circle" className="w-5 h-5 flex-shrink-0 mt-0.5" />
                                <div>
                                    <p className="font-bold">翻译遇到问题：</p>
                                    <p>{error}</p>
                                    <p className="mt-2 text-xs opacity-80 font-semibold text-red-600">
                                        👉 请检查第 25 行：const apiKey = "你的Key"
                                    </p>
                                </div>
                            </div>
                        )}

                        {results && (
                            <div className="flex-1 overflow-hidden flex flex-col border-t pt-4">
                                <div className="mb-4">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-sm font-bold text-gray-700 flex items-center gap-2"><Icon name="align-left" className="w-4 h-4"/>一键提取 (逗号分隔)</span>
                                        <button onClick={() => doCopy(LANGUAGES.map(l => results[l.key]).join('，'), 'comma')} className="text-xs text-blue-600 font-bold flex items-center gap-1 hover:bg-blue-50 px-2 py-1 rounded transition-colors">
                                            <Icon name={copied === 'comma' ? "check-check" : "copy"} className="w-3 h-3" />
                                            {copied === 'comma' ? '已复制' : '复制结果'}
                                        </button>
                                    </div>
                                    <div className="p-3 bg-gray-50 border rounded-lg text-xs break-all leading-relaxed text-gray-600 custom-scrollbar max-h-20 overflow-y-auto shadow-inner">
                                        {LANGUAGES.map(l => results[l.key]).join('，')}
                                    </div>
                                </div>
                                <div className="flex-1 overflow-hidden flex flex-col">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-sm font-bold text-gray-700 flex items-center gap-2"><Icon name="table" className="w-4 h-4"/>表格明细</span>
                                        <button onClick={() => doCopy(LANGUAGES.map(l => `${l.zh}\t${results[l.key]}`).join('\n'), 'table')} className="text-xs text-blue-600 font-bold flex items-center gap-1 hover:bg-blue-50 px-2 py-1 rounded transition-colors">
                                            <Icon name={copied === 'table' ? "check-check" : "copy"} className="w-3 h-3" />
                                            {copied === 'table' ? '已复制' : '复制表格'}
                                        </button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto border rounded-lg custom-scrollbar shadow-inner">
                                        <table className="w-full text-xs">
                                            <thead className="bg-gray-100 sticky top-0 shadow-sm">
                                                <tr><th className="p-2 text-left border-b w-24">语言</th><th className="p-2 text-left border-b">翻译结果 (微软术语风格)</th></tr>
                                            </thead>
                                            <tbody>
                                                {LANGUAGES.map(l => (
                                                    <tr key={l.key} className="border-b hover:bg-gray-50 transition-colors">
                                                        <td className="p-2 font-medium bg-gray-50/50">{l.zh}</td>
                                                        <td className="p-2 text-gray-700">{results[l.key]}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            return (
                <div className="min-h-screen pb-12">
                    <header className="bg-white border-b sticky top-0 z-20 shadow-sm">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl flex items-center justify-center text-white shadow-lg">
                                    <Icon name="languages" className="w-7 h-7" />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black text-gray-900 leading-tight tracking-tight">Cosmetics Pro Translator</h1>
                                    <div className="flex items-center gap-2">
                                        <span className="text-[10px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-bold uppercase">Microsoft & AI Hybrid</span>
                                        <p className="text-xs text-gray-500 font-medium">化妆品 24 国语言标签合规助手</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>
                    <main className="max-w-7xl mx-auto px-6 mt-8">
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                            <TranslationCard 
                                title="🟦 品类词翻译" theme="blue" type="category"
                                examples={['eyeshadow', 'body paint', 'liquid lipstick']}
                                hint="输出品类词翻译。遵循微软翻译与欧盟标准术语库。"
                            />
                            <TranslationCard 
                                title="🟩 安全警告语" theme="green" type="safeUse"
                                examples={['Keep out of reach of children', 'Do not swallow']}
                                hint="输出安全警告翻译。模拟官方监管文案风格。"
                            />
                        </div>
                        <footer className="mt-12 text-center text-gray-400 text-xs">
                            <p>© 2024 Cosmetics Translation Assistant - 基于 Cloudflare Pages 部署</p>
                        </footer>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
