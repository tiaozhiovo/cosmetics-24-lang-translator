<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmetics 24-Language Translation Assistant</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50/50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // API Key injected by environment
        const apiKey = ""; 

        const LANGUAGES = [
            { key: 'English', zh: '英语' }, { key: 'German', zh: '德语' }, { key: 'French', zh: '法语' },
            { key: 'Spanish', zh: '西班牙语' }, { key: 'Italian', zh: '意大利语' }, { key: 'Danish', zh: '丹麦语' },
            { key: 'Czech', zh: '捷克语' }, { key: 'Swedish', zh: '瑞典语' }, { key: 'Greek', zh: '希腊语' },
            { key: 'Finnish', zh: '芬兰语' }, { key: 'Portuguese', zh: '葡萄牙语' }, { key: 'Dutch', zh: '荷兰语' },
            { key: 'Bulgarian', zh: '保加利亚语' }, { key: 'Croatian', zh: '克罗地亚语' }, { key: 'Estonian', zh: '爱沙尼亚语' },
            { key: 'Hungarian', zh: '匈牙利语' }, { key: 'Irish', zh: '爱尔兰语' }, { key: 'Latvian', zh: '拉脱维亚语' },
            { key: 'Lithuanian', zh: '立陶宛语' }, { key: 'Maltese', zh: '马耳他语' }, { key: 'Polish', zh: '波兰语' },
            { key: 'Romanian', zh: '罗马尼亚语' }, { key: 'Slovak', zh: '斯洛伐克语' }, { key: 'Slovenian', zh: '斯洛文尼亚语' }
        ];

        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const copyToClipboard = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            return true;
        };

        const fetchTranslation = async (text, type) => {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const systemPrompt = type === 'category' 
                ? `You are an expert cosmetics translator. Translate the given cosmetic product category accurately into 24 European languages. Use official terminology.`
                : `You are an expert cosmetics translator. Translate the given cosmetic safety instruction accurately into 24 European languages. Use formal regulatory phrasing.`;

            const properties = {};
            LANGUAGES.forEach(lang => { properties[lang.key] = { type: "STRING" }; });

            const payload = {
                contents: [{ parts: [{ text: `Translate: "${text}"` }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: { type: "OBJECT", properties: properties, required: LANGUAGES.map(l => l.key) }
                }
            };

            for (let attempt = 0; attempt <= 3; attempt++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error(`Status: ${response.status}`);
                    const data = await response.json();
                    return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (e) {
                    if (attempt === 3) throw e;
                    await new Promise(r => setTimeout(r, 2000));
                }
            }
        };

        const TranslationCard = ({ title, theme, hint, examples, type }) => {
            const [input, setInput] = useState('');
            const [results, setResults] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [copied, setCopied] = useState(null);

            const themeClasses = theme === 'blue' 
                ? { border: 'border-blue-200', bg: 'bg-blue-50', text: 'text-blue-800', btn: 'bg-blue-600 hover:bg-blue-700', icon: 'blue', highlight: 'bg-blue-100' }
                : { border: 'border-emerald-200', bg: 'bg-emerald-50', text: 'text-emerald-800', btn: 'bg-emerald-600 hover:bg-emerald-700', icon: 'emerald', highlight: 'bg-emerald-100' };

            const handleAction = async () => {
                if (!input.trim()) return;
                setLoading(true); setError(''); setResults(null);
                try {
                    const res = await fetchTranslation(input.trim(), type);
                    setResults(res);
                } catch (e) {
                    setError('翻译服务繁忙，请稍后再试。');
                } finally {
                    setLoading(false);
                }
            };

            const doCopy = (text, type) => {
                if (copyToClipboard(text)) {
                    setCopied(type);
                    setTimeout(() => setCopied(null), 2000);
                }
            };

            return (
                <div className={`bg-white rounded-2xl shadow-sm border ${themeClasses.border} overflow-hidden flex flex-col h-full`}>
                    <div className={`${themeClasses.bg} p-5 border-b ${themeClasses.border} flex items-center gap-3`}>
                        <Icon name={theme === 'blue' ? "languages" : "sparkles"} className={`w-6 h-6 text-${themeClasses.icon}-500`} />
                        <h2 className={`text-xl font-bold ${themeClasses.text}`}>{title}</h2>
                    </div>
                    <div className="p-6 flex-1 flex flex-col overflow-hidden">
                        <div className="text-sm text-gray-600 mb-4 bg-gray-50 p-4 rounded-xl border border-gray-100">{hint}</div>
                        <div className="flex flex-wrap gap-2 mb-4">
                            {examples.map(ex => (
                                <button key={ex} onClick={() => setInput(ex)} className="text-xs px-3 py-1 rounded-full border border-gray-200 hover:bg-gray-100 transition-colors">{ex}</button>
                            ))}
                        </div>
                        <textarea 
                            value={input} 
                            onChange={e => setInput(e.target.value)}
                            className="w-full p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none h-24 mb-4 resize-none"
                            placeholder="请输入内容..."
                        />
                        <div className="flex gap-3 mb-6">
                            <button onClick={handleAction} disabled={loading} className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-lg text-white font-bold transition-all shadow-md active:scale-95 ${themeClasses.btn}`}>
                                {loading ? <Icon name="loader-2" className="animate-spin" /> : <Icon name="wand-2" />}
                                <span>开始翻译 (Translate)</span>
                            </button>
                            <button onClick={() => {setInput(''); setResults(null);}} className="px-4 py-3 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 transition-colors"><Icon name="trash-2" /></button>
                        </div>

                        {error && <div className="p-3 mb-4 bg-red-50 text-red-600 rounded-lg text-sm flex items-center gap-2"><Icon name="alert-circle" className="w-4 h-4"/>{error}</div>}

                        {results && (
                            <div className="flex-1 overflow-hidden flex flex-col border-t pt-4">
                                <div className="mb-4">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-sm font-bold text-gray-700">一键提取模式 (逗号分隔)</span>
                                        <button onClick={() => doCopy(LANGUAGES.map(l => results[l.key]).join('，'), 'comma')} className="text-xs text-blue-600 font-bold flex items-center gap-1 hover:underline">
                                            <Icon name={copied === 'comma' ? "check-check" : "copy"} className="w-3 h-3" />
                                            {copied === 'comma' ? '已复制' : '复制结果'}
                                        </button>
                                    </div>
                                    <div className="p-3 bg-gray-50 border rounded-lg text-xs break-all leading-relaxed text-gray-600 custom-scrollbar max-h-20 overflow-y-auto">
                                        {LANGUAGES.map(l => results[l.key]).join('，')}
                                    </div>
                                </div>
                                <div className="flex-1 overflow-hidden flex flex-col">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-sm font-bold text-gray-700">表格明细</span>
                                        <button onClick={() => doCopy(LANGUAGES.map(l => `${l.zh}\t${results[l.key]}`).join('\n'), 'table')} className="text-xs text-blue-600 font-bold flex items-center gap-1 hover:underline">
                                            <Icon name={copied === 'table' ? "check-check" : "copy"} className="w-3 h-3" />
                                            {copied === 'table' ? '已复制' : '复制表格'}
                                        </button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto border rounded-lg custom-scrollbar">
                                        <table className="w-full text-xs">
                                            <thead className="bg-gray-100 sticky top-0">
                                                <tr><th className="p-2 text-left border-b w-24">语言</th><th className="p-2 text-left border-b">翻译结果</th></tr>
                                            </thead>
                                            <tbody>
                                                {LANGUAGES.map(l => (
                                                    <tr key={l.key} className="border-b hover:bg-gray-50">
                                                        <td className="p-2 font-medium">{l.zh}</td>
                                                        <td className="p-2 text-gray-600">{results[l.key]}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            return (
                <div className="min-h-screen pb-12">
                    <header className="bg-white border-b sticky top-0 z-20 shadow-sm">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><Icon name="languages" /></div>
                                <div>
                                    <h1 className="text-xl font-extrabold text-gray-900 leading-tight">Cosmetics Translation Assistant</h1>
                                    <p className="text-xs text-gray-500 font-medium">化妆品欧盟 24 国语言标签辅助工具</p>
                                </div>
                            </div>
                        </div>
                    </header>
                    <main className="max-w-7xl mx-auto px-6 mt-8">
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                            <TranslationCard 
                                title="🟦 品类词翻译" theme="blue" type="category"
                                examples={['eyeshadow', 'body paint', 'lip gloss']}
                                hint="建议输入英文品类词。例如：eyeshadow。系统将生成欧盟24国对应名词。"
                            />
                            <TranslationCard 
                                title="🟩 安全使用说明" theme="green" type="safeUse"
                                examples={['For external use only', 'Avoid contact with eyes']}
                                hint="输入常见的安全警告语。系统将生成标准的欧盟标签翻译方案。"
                            />
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
